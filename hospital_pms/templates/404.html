{% extends "base.html" %}
{% block title %}404 – Page Not Found{% endblock %}
{% block page_title %}Page Not Found{% endblock %}

{% block content %}
<div style="text-align:center; padding:80px 20px;">
  <div style="font-size:80px; margin-bottom:16px;">🏥</div>
  <h1 style="font-size:48px; font-weight:800; color:var(--primary); margin-bottom:8px;">404</h1>
  <p style="font-size:18px; color:var(--text-secondary); margin-bottom:28px;">
    Oops! The page you're looking for doesn't exist.
  </p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">← Back to Dashboard</a>
</div>
{% endblock %}
