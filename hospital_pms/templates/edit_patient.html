{% extends "base.html" %}
{% block title %}Edit Patient{% endblock %}
{% block page_icon %}✏️{% endblock %}
{% block page_title %}Edit Patient{% endblock %}

{% block content %}
<div style="max-width:600px; margin:0 auto;">
  <div class="card">
    <div class="card-header">
      <span class="card-title">✏️ Edit Patient — {{ patient.name }}</span>
      <a href="{{ url_for('patients') }}" class="btn btn-ghost btn-sm">← Back</a>
    </div>
    <div class="card-body">
      <form method="POST"
            action="{{ url_for('edit_patient', patient_id=patient.patient_id) }}"
            data-validate="true">

        <div class="form-group">
          <label for="ep-name">Full Name</label>
          <input type="text" id="ep-name" name="name"
                 value="{{ patient.name }}" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="ep-age">Age</label>
            <input type="number" id="ep-age" name="age"
                   value="{{ patient.age }}" min="1" max="149"
                   required data-type="age" />
          </div>
          <div class="form-group">
            <label for="ep-gender">Gender</label>
            <select id="ep-gender" name="gender" required>
              {% for g in ['Male','Female','Other'] %}
                <option {% if patient.gender == g %}selected{% endif %}>{{ g }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="ep-phone">Mobile Number</label>
          <input type="tel" id="ep-phone" name="phone"
                 value="{{ patient.phone }}" required data-type="phone" />
        </div>

        <div class="form-group">
          <label for="ep-address">Address</label>
          <textarea id="ep-address" name="address" required>{{ patient.address }}</textarea>
        </div>

        <div class="form-group">
          <label for="ep-blood">Blood Group</label>
          <select id="ep-blood" name="blood_group" required>
            {% for bg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
              <option {% if patient.blood_group == bg %}selected{% endif %}>{{ bg }}</option>
            {% endfor %}
          </select>
        </div>

        <div style="display:flex; gap:12px; margin-top:8px;">
          <button type="submit" class="btn btn-primary" style="flex:1">
            💾 Save Changes
          </button>
          <a href="{{ url_for('patients') }}" class="btn btn-ghost" style="flex:1; justify-content:center;">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
